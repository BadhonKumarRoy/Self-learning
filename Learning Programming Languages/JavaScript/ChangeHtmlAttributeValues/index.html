<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <p>JavaScript can change HTML attribute values.</p>

    <button onclick="document.getElementById('image').src='../images/pic_bulbon.gif'">Turn on the light</button>

    <img id="image" src="../images/pic_bulboff.gif" alt="Sample Image" />

    <button id="off" onclick="document.getElementById('image').src='../images/pic_bulboff.gif'">Turn off the light</button>
    <br>
    <button onclick="toggleLight()" style="left: 122.5px; top: 20px; position: relative">Switch Light</button>

    <script src="script.js"></script>
  </body>
</html>
